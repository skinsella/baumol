name: Build and deploy

on:
  schedule:
    # Mondays 06:00 UTC — CSO publishes EHQ03 quarterly, Eurostat updates weekly.
    # Weekly is overkill but cheap; the page shows the last refresh timestamp.
    - cron: "0 6 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: python -m build.render

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
